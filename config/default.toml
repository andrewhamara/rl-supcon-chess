[engine]
num_threads = 8
mcts_simulations = 800
c_puct = 2.5
dirichlet_alpha = 0.3
dirichlet_epsilon = 0.25
temperature = 1.0
temperature_threshold_move = 30
batch_size_inference = 8
transposition_table_mb = 128

[network]
num_blocks = 8
num_filters = 128
policy_channels = 32
value_hidden_dim = 128
projection_dim = 128
input_planes = 21
policy_size = 1858

[training]
learning_rate = 0.02
lr_schedule = "cosine"
weight_decay = 1e-4
batch_size = 2048
replay_buffer_size = 1_000_000
training_steps = 500_000
checkpoint_interval = 5000
selfplay_games_per_cycle = 256
cycles = 200

[training.loss]
policy_weight = 1.0
value_weight = 1.0

[supcon]
enabled = true
temperature = 0.07
base_temperature = 0.07
contrast_mode = "all"
num_bins = 12
bin_strategy = "equal_width"
min_bin_size = 4
noise_std = 0.01
projection_layers = 2

[supcon.schedule]
phase1_end = 0.2
phase2_end = 0.7
alpha_start = 0.99
alpha_end = 0.3
beta_start = 0.01
beta_end = 0.7

[quantization]
enabled = true
scheme = "int8_symmetric"
calibration_positions = 10000
